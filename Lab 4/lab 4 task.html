<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=
    , initial-scale=1.0"
    />
    <title>Form stuff</title>
  </head>
  <body>
    <form>
      <fieldset>
        <legend>Registration Form</legend>
        <div>
          <label for="fullname"> Full name</label>
          <input type="text" name="fullname" />
        </div>
        <br />

        <div>
          <label for="email">Email</label>
          <input type="email" name="email" />
        </div>
        <br />

        <div>
          <label for="age">Age</label>
          <input type="number" name="Age" />
        </div>
        <br />

        <div>
          <p>Gender</p>
          <label for="Male">Male</label>
          <input type="radio" value="Male" />
          <span>
            <label for="Female">Female</label>
            <input type="radio" value="Female" />
          </span>
        </div>

        <div>
          <br />
          Faculty 
          <select name="" id="">
            <option>Natural And Applied Sciences</option>
            <option>Faculty Of Computing</option>
          </select>
        </div>

         <div>
          <br />
          <label for="document-submit">Document</label>
          <input type="file" name="document-submit" id="" />
        </div>

        <div><br>
        Document Submitted: <br>
        <label for="Admission letter"> Admission Letter</label>
        <input type="checkbox" name="admission letter"> 
        
        <label for="Payment Receipt"> Payment Receipt</label>
        <input type="checkbox" name="Payment Receipt"> 
        </div>




        <div>
          <br />
          <label for="">Additional information</label><br />
          <textarea placeholder="Additional information"></textarea>
        </div>

        <div>
          <button type="submit"></button>
          <input type="submit" />

          <button type="reset"></button>
          <input type="reset"></label>
        </div>
      </fieldset>
    </form>
  </body>
</html>
